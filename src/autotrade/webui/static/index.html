<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <title>CornerHead</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div id="app">
    <header class="topbar">
      <a href="#/" class="brand">
        <svg class="logo" viewBox="0 0 32 32" width="30" height="30" aria-hidden="true">
          <defs>
            <linearGradient id="ch-g" x1="0" y1="1" x2="1" y2="0">
              <stop offset="0" stop-color="#2456c4"/>
              <stop offset="1" stop-color="#6ea8ff"/>
            </linearGradient>
          </defs>
          <!-- right-angle corner bracket -->
          <path d="M8 25 V9 H24" fill="none" stroke="url(#ch-g)" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="miter"/>
          <!-- head dot -->
          <circle cx="22.5" cy="22.5" r="5.5" fill="url(#ch-g)"/>
        </svg>
        CornerHead
      </a>
      <div class="topbar-side">
        <div id="topbar-right" class="topbar-right"></div>
        <select id="ui-zoom" class="zoom-select" title="界面缩放（按设备记忆）">
          <option value="0.9">90%</option>
          <option value="1" selected>100%</option>
          <option value="1.15">115%</option>
          <option value="1.3">130%</option>
          <option value="1.5">150%</option>
        </select>
        <button id="theme-toggle" class="btn small icon" title="切换浅色/深色主题">🌙</button>
      </div>
    </header>
    <main id="main"></main>
  </div>
  <div id="modal-root"></div>
  <div id="toast-root"></div>
  <script type="module" src="/static/app.js"></script>
</body>
</html>
