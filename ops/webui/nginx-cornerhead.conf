# CornerHead console — frontend interaction layer (docs/deployment_documentation.md).
# Loopback-only: reachable exclusively through SSH tunnels from authorized keys.
# Static SPA is served locally; /api proxies to the compute hub's reverse tunnel.
server {
    listen 127.0.0.1:8080;
    server_name cornerhead;

    root /opt/cornerhead/static;
    index index.html;

    location /api/ {
        proxy_pass http://127.0.0.1:38889;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        # SSE (live agent trace): no buffering, long read timeout.
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        # Compute hub offline (tunnel down) -> clean JSON instead of nginx HTML.
        error_page 502 504 = @hub_down;
    }

    location @hub_down {
        default_type application/json;
        return 503 '{"detail": "计算主机离线：本机反向隧道未连接（等待 keepalive 重连或在计算主机上运行 ops/webui/webui_stack.sh start）"}';
    }

    # The SPA references its assets under /static/ (same URLs as the local
    # FastAPI mount); files live at the deploy root.
    location /static/ {
        alias /opt/cornerhead/static/;
    }

    location / {
        try_files $uri /index.html;
    }
}
