experiment_id: pilot_2020_daily_value_quality
raw_dir: ../../data/raw
feature_dir: ../../data/features
ledger_path: ../../experiments/trial_ledger/pilot_2020_daily.jsonl

track:
  track_id: horizon_6m_value_quality
  target_holding_months: 6
  train_length_months: 36
  test_length_months: 6
  step_months: 3
  template_bank: configs/templates/horizon_6m

protocol:
  protocol_id: daily_wfo_2020_v1
  start_date: 2020-01-02
  end_date: 2025-12-31
  heldout_start: 2025-01-01
  decision_anchor: month_end
  rebalance_frequency: monthly
  nl_weight: 0.0
  cost_model:
    commission_bps: 3.0
    stamp_tax_bps: 5.0
    slippage_bps: 5.0

trade_policy:
  policy_id: daily_long_only_t1_v1
  data_granularity: daily
  settlement_mode: t_plus_1
  max_daily_turnover_pct: 0.2
  max_position_deviation_pct: 0.05
  min_expected_edge_after_cost: 0.0
  event_de_risk_pct: 0.5
  event_exit_loss_pct: 18.0
  allowed_actions:
    - hold
    - enter
    - exit
    - trim
    - add
    - rebalance
    - event_de_risk
    - rotate_to_next_candidate
    - cash_buffer

# This is deliberately simple: start with formulaic features from base research data,
# then add event/NL tracks only after the PIT layer and daily replay are tested.
template:
  template_id: value_quality_formulaic_v1
  strategy_family: quality_value
  variable_families:
    - valuation
    - liquidity
    - quality
    - momentum
    - trading_constraints
  parameter_space:
    max_pe_ttm_quantile: [0.2, 0.4]
    max_pb_quantile: [0.2, 0.5]
    min_turnover_quantile: [0.2, 0.4]
    top_n: [30, 50, 80]
  objective: excess_return_after_cost

universe:
  exchanges: [SSE, SZSE, BSE]
  include_st: false
  min_listing_days: 180
  min_avg_amount_20d: 300000.0
